syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.bienestar";
option java_outer_classname = "GymProto";

service GymService {
  rpc ReserveSession (GymReservationRequest) returns (GymReservationResponse);
  rpc CancelReservation (GymCancelRequest) returns (GymCancelResponse);
  rpc GetReservations (GymStudentRequest) returns (GymReservationList);
}

enum GymReservationStatus {
  GYM_STATUS_UNSPECIFIED = 0;
  GYM_RESERVED = 1;
  GYM_CANCELLED = 2;
}

message GymReservationRequest {
  string studentId = 1;
  string date = 2;
  string hour = 3;
}

message GymReservationResponse {
  string id = 1;
  string studentId = 2;
  string date = 3;
  string hour = 4;
  GymReservationStatus status = 5;
}

message GymCancelRequest {
  string reservationId = 1;
}

message GymCancelResponse {
  string reservationId = 1;
  GymReservationStatus status = 2;
}

message GymStudentRequest {
  string studentId = 1;
}

message GymReservationList {
  repeated GymReservationResponse reservations = 1;
}